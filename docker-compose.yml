
services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: book-system-db
    environment:
      POSTGRES_DB: bookdb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5433:5432"  # Using 5433 on host to avoid conflicts with local PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d bookdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - book-system-network

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: book-system-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bookdb
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: mypassword
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      JWT_SECRET: QKLK73fM+PaB7necKQUR59JU6HXNO9GWGkV+sDY38ac=
      JWT_ACCESS_TOKEN_EXPIRATION_MINUTES: 15
      JWT_REFRESH_TOKEN_EXPIRATION_DAYS: 7
      SPRING_SQL_INIT_MODE: never
      SPRING_SQL_INIT_PLATFORM: postgres
      SPRING_SQL_INIT_SEPARATOR: ;;
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - book-system-network
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8080
        BACKEND_URL: http://backend:8080
    container_name: book-system-frontend
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8080
      BACKEND_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - book-system-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  book-system-network:
    driver: bridge

